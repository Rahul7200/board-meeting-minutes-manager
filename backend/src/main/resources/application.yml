# application.yml: Spring Boot application configuration for Board Meeting Minutes Manager.
# Configures datasource, JPA, Flyway, JWT secret, file upload limits, and SpringDoc.

spring:
  application:
    name: board-meeting-minutes-manager

  # ── DataSource (PostgreSQL 15) ─────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/board_minutes_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2

  # ── JPA / Hibernate ────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns schema — Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # ── Flyway ────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── File Upload ─────────────────────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

  # ── JPA Auditing ──────────────────────────────────────────────────────────
  data:
    jpa:
      repositories:
        enabled: true

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ── JWT ───────────────────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:b0ardM1nut3sM4n4g3rS3cr3tK3y2026SuperLongKeyForHS256Algo}
    expiration-ms: 86400000   # 24 hours

# ── SpringDoc / Swagger UI ─────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    com.internship.tool: DEBUG
    org.springframework.security: WARN
    org.flywaydb: INFO

---
# ── Test profile overrides ────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
